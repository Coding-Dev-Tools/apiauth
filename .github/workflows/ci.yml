name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: pip install ruff && ruff check src/ --target-version py310

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r <(pip freeze) --format json --output pip-audit.json || true
        continue-on-error: true

      - name: Upload security audit
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: pip-audit.json
          category: pip-audit

      - name: Check CLI works
        run: |
          apiauth --version
          apiauth --help
          apiauth generate --help
